# tmux.conf for use INSIDE a THM AttackBox, reached via the thm.incus ttyd broker.
# Prepared 2026-07-20, updated 2026-07-22 to merge in the operator's own personal
# keybinding/status-bar preferences. Not a security-hardened config (unlike the
# broker's own /opt/thm/tmux.conf) -- this runs as root on a disposable target
# the user already owns, so it's just a normal, convenient config.
#
# IMPORTANT -- read before expecting clipboard magic:
# This file CANNOT make tmux-copy -> OS clipboard work, and `set-clipboard on`
# below is essentially a no-op for that purpose. ttyd 1.7.7's bundled xterm.js
# (the broker's frontend) has no OSC 52 handler at all -- verified by extracting
# the gzip blob from the ttyd binary and grepping for it. That's a frontend
# limitation with zero tmux-config workaround, on the broker's own tmux or this
# one. `y`/`Y` below still yank into tmux's own internal paste buffer (usable
# with the C-p/P bindings, inside this same tmux session) -- just not out to the
# browser's OS clipboard.
#
# The working copy-out method, already true today with zero tmux involvement:
#   1. Hold Shift while dragging over the text you want (forces the browser's
#      own xterm.js selection instead of sending the drag to tmux/mouse-tracking).
#   2. Ctrl+Insert to copy (Ctrl+C would send SIGINT instead).
# This works whether or not this tmux is running, and whether or not you're
# inside tmux copy-mode -- it grabs whatever is visibly rendered on screen.
# Limitation: only the visible viewport is grabbed (tmux uses the alt screen,
# so there's no browser-side scrollback) -- scroll and repeat for older lines.
#
# Mouse-passthrough note: the broker's own tmux (outer layer, on thm.incus)
# forwards plain click + drag to whatever is mouse-aware on the other end of the
# ssh session (send -M), which is how this inner tmux's `mouse on` below ends up
# working at all. It deliberately does NOT forward double/triple-click or right
# click (see /opt/thm/tmux.conf), so don't rely on double-click-to-select-word in
# here -- use Shift+drag instead, per above.
#
# Prefix is C-t (not default C-b): the outer/broker tmux has prefix disabled
# (`prefix None`), so any prefix choice here passes straight through with no
# collision -- C-t is just this operator's preference.
#
# default-shell is intentionally left unset (falls back to the login shell).
# AttackBoxes are disposable, reset-per-session minimal Linux images that won't
# reliably have fish (or any non-default shell) installed -- pointing
# default-shell at one would break new-window/split-window whenever it's absent.

set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g aggressive-resize on
setw -g mode-keys vi

# session.sh forces TERM=xterm-256color for the ssh client (see /opt/thm's
# session.sh), so that's the "outside tmux" value terminal-overrides needs.
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ',xterm-256color:RGB'
set-option -g set-clipboard on

# prefix
set -g prefix C-t
unbind C-b

# status bar
set-option -g status-position top
set-option -g status-left-length 90
set-option -g status-right-length 90
set-option -g status-left '#H:[#P]'
set-option -g status-right '[%Y-%m-%d(%a) %H:%M]'
set-option -g status-interval 1
set-option -g status-justify centre
set-option -g status-bg "colour238"
set-option -g status-fg "colour255"

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# split bindings
bind | split-window -h
bind - split-window -v

# wheel scroll -> copy-mode (reaches here via the outer broker tmux's
# passthrough once `mouse on` above sets mouse_any_flag; see the note up top)
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind-key -n WheelDownPane select-pane -t= \; send-keys -M

# copy-mode (vi-style)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Y send -X copy-line
bind-key C-p paste-buffer
bind-key P paste-buffer
bind -T copy-mode-vi Escape send-keys -X cancel
