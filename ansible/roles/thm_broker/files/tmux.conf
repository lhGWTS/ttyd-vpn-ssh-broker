# tmux config for the THM broker's persistent sessions.
set -g status off                 # seamless single-terminal look
set -g escape-time 0
set -g history-limit 20000
set -g destroy-unattached off     # keep the ssh alive when the browser drops
setw -g aggressive-resize on      # resize to the attached client, not the smallest

# --- lockdown: no key may reach a tmux command --------------------------------
# The browser user is untrusted and tmux runs OUTSIDE the bwrap sandbox, so a
# reachable command-prompt (C-b :) would mean arbitrary commands via run-shell.
# Empty every table rather than unbinding known-bad keys.
set -g prefix None
set -g prefix2 None
unbind C-b
unbind -a -T root
unbind -a -T prefix
unbind -a -T copy-mode
unbind -a -T copy-mode-vi
set -s set-clipboard external

# --- allow-list: wheel scrollback + mouse passthrough -------------------------
# Nothing below can spawn a shell: send -M only forwards the raw mouse event to
# the pane's application, and the copy-mode motions are pure screen movement.
#
# tmux-side drag-SELECT copy was removed on 2026-07-14: ttyd 1.7.7's xterm.js has
# no OSC 52 handler, so a tmux copy never reaches the browser clipboard (the tmux
# paste buffer is also unreachable here -- prefix and paste-buffer are disabled).
# Copy-out is done with the browser's own selection instead: Shift+drag, Ctrl+Ins.
# We keep send -M passthrough so the mouse still works in remote apps (vim, less,
# htop); without it, unbound mouse events would simply be swallowed.
#
# Deliberately NOT bound: Double/TripleClick1Pane (defaults call run-shell),
# MouseDown3Pane (default display-menu runs tmux commands), paste-buffer,
# command-prompt, new-window, split-window, detach-client.
set -g mouse on

# Not in copy mode and the app doesn't want the mouse -> enter copy mode;
# otherwise hand the wheel to the app (vim, less).
bind -T root WheelUpPane if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -e }
# No root WheelDownPane binding, matching the default: unbound mouse keys fall
# through to the pane, which is how wheel-down reaches an alt-screen app.

# Forward clicks/drags to mouse-aware remote apps only; never start a tmux
# selection. For a plain shell (no mouse mode) a drag does nothing.
bind -T root MouseDown1Pane select-pane -t = \; send-keys -M
bind -T root MouseDrag1Pane if-shell -F "#{mouse_any_flag}" "send-keys -M"

bind -T copy-mode WheelUpPane   select-pane \; send-keys -X -N 5 scroll-up
bind -T copy-mode WheelDownPane select-pane \; send-keys -X -N 5 scroll-down

# copy-mode -e already exits on scrolling back to the bottom, but without an
# explicit exit key an empty copy-mode table swallows all typing, which reads as
# a dead terminal.
bind -T copy-mode q      send-keys -X cancel
bind -T copy-mode Escape send-keys -X cancel
