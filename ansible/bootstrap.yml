---
# Stage 0: put a python3 on thm so the normal (python-based) Ansible modules in
# site.yml work. This is a provisioning-only dependency; teardown.yml removes it.
#
# Uses the `raw` module exclusively, so it needs no python on the target.
#
#   ansible-playbook -i inventory.ini bootstrap.yml
- name: Bootstrap python3 on thm
  hosts: thm
  gather_facts: false
  tasks:
    - name: Install python3 (provisioning dependency only)
      ansible.builtin.raw: apk info -e python3 >/dev/null 2>&1 || apk add python3
      register: boot_py
      changed_when: "'Installing python3' in boot_py.stdout or 'Executing' in boot_py.stdout"
