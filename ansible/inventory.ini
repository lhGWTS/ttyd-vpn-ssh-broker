# Control node = wherever you run ansible-playbook from. Point this at whatever
# host/container runs the broker; `thm.incus` below is just an example name.
# Supply your own SSH key -- ./thm is a placeholder path, it is not shipped here.
[thm]
thm.incus

[thm:vars]
ansible_user=root
ansible_ssh_private_key_file=./thm
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new
# python3 is not present by default on thm; bootstrap.yml installs it (temporarily).
ansible_python_interpreter=/usr/bin/python3
